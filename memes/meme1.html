<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body { margin: 0; padding: 0; background: #000; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
.meme {
  width: 1080px; height: 1080px;
  background: linear-gradient(135deg, #0f0c29 0%, #1a1535 40%, #2d1f4e 100%);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 80px; box-sizing: border-box;
  font-family: Georgia, serif;
  position: relative; overflow: hidden;
}
.glow {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: radial-gradient(circle at 30% 20%, rgba(212,175,55,0.08) 0%, transparent 50%),
              radial-gradient(circle at 70% 80%, rgba(212,175,55,0.05) 0%, transparent 40%);
}
.content { position: relative; z-index: 1; text-align: center; }
.moon { font-size: 48px; margin-bottom: 50px; opacity: 0.6; }
.quote {
  font-size: 52px; color: #d4af37; line-height: 1.4; font-style: italic;
  margin-bottom: 50px; text-shadow: 0 2px 20px rgba(212,175,55,0.3);
}
.quote .sub {
  font-size: 42px; color: #e8d5a3; font-style: normal; opacity: 0.9;
  display: block; margin-top: 10px;
}
.divider {
  width: 60px; height: 2px;
  background: linear-gradient(90deg, transparent, #d4af37, transparent);
  margin: 0 auto 40px;
}
.brand {
  font-size: 24px; color: #c9b896; letter-spacing: 6px;
  text-transform: uppercase; font-family: Arial, sans-serif;
}
.credit {
  font-size: 16px; color: #8a7d6b; letter-spacing: 3px;
  margin-top: 12px; font-family: Arial, sans-serif;
}
</style>
</head>
<body>
<div class="meme">
  <div class="glow"></div>
  <div class="content">
    <div class="moon">☽</div>
    <div class="quote">
      "No one can heal you<br>but yourself.
      <span class="sub">I just help you<br>remember how."</span>
    </div>
    <div class="divider"></div>
    <div class="brand">LUCE HEALING</div>
    <div class="credit">Christina Workman • Certified Reiki Master</div>
  </div>
</div>
</body>
</html>
