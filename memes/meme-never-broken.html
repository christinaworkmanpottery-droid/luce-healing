<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
body { margin: 0; padding: 0; background: #000; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
.meme {
  width: 1080px; height: 1080px;
  position: relative; overflow: hidden;
  display: flex; flex-direction: column;
  font-family: Georgia, serif;
}
.bg {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background-image: url('https://images.unsplash.com/photo-1507652313519-d4e9174996dd?w=1080&h=1080&fit=crop');
  background-size: cover; background-position: center;
}
.overlay {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(15,12,41,0.65);
}
.content {
  position: relative; z-index: 1;
  display: flex; flex-direction: column; height: 100%;
  padding: 80px 80px 60px;
  box-sizing: border-box;
  justify-content: center; align-items: center;
  text-align: center;
}
.quote-mark {
  font-size: 120px; color: rgba(212,175,55,0.25);
  line-height: 0.6; margin-bottom: 20px;
  font-family: Georgia, serif;
}
.quote {
  font-size: 52px; color: #d4af37;
  line-height: 1.35; max-width: 850px;
  text-shadow: 0 2px 20px rgba(0,0,0,0.5);
  margin-bottom: 50px;
}
.divider {
  width: 80px; height: 2px;
  background: linear-gradient(90deg, transparent, #d4af37, transparent);
  margin: 0 auto 30px;
}
.brand {
  font-size: 20px; color: #c9b896;
  letter-spacing: 6px; text-transform: uppercase;
  font-family: Arial, sans-serif;
}
.handle {
  font-size: 16px; color: #8a7d6b;
  letter-spacing: 2px; margin-top: 10px;
  font-family: Arial, sans-serif;
}
</style></head><body>
<div class="meme">
  <div class="bg"></div>
  <div class="overlay"></div>
  <div class="content">
    <div class="quote-mark">"</div>
    <div class="quote">You were never broken.<br>You just forgot how powerful you are.</div>
    <div class="divider"></div>
    <div class="brand">LUCE HEALING</div>
    <div class="handle">@lucehealing13</div>
  </div>
</div>
</body></html>
